name: Sync upstream and publish to Docker Hub

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  UPSTREAM_REPO: https://github.com/oyvhov/Tunet.git
  IMAGE_NAME: mykcx/tunet

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        id: sync
        shell: bash
        run: |
          BEFORE="$(git rev-parse HEAD)"
          git remote add upstream "${UPSTREAM_REPO}" 2>/dev/null || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || {
            echo "Upstream merge conflict. Resolve manually."
            exit 1
          }
          AFTER="$(git rev-parse HEAD)"

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.sync.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.sync.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.sync.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.sync.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.sync.outputs.sha_short }}
